<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR 平面配置アプリ</title>
    <!-- model-viewerコンポーネントの読み込み -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #f0f0f0;
        }

        /* 3Dモデルプレビューエリア */
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        /* ログウィンドウ（画面右上） */
        #log-area {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 250px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            border-radius: 5px;
            z-index: 100;
            pointer-events: none; /* タッチイベントを下の要素にパスする */
        }

        /* カスタムのAR起動ボタンエリア */
        #ar-ui-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        /* WebXR内で表示する撮影ボタン */
        #capture-btn {
            display: none;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background-color: #28a745;
        }

        /* model-viewer標準のARボタンを非表示にする */
        model-viewer::part(default-ar-button) {
            display: none;
        }
    </style>
</head>
<body>

    <!-- デバッグログ表示エリア -->
    <div id="log-area">=== デバッグログ ===<br></div>

    <!-- 3D・ARビューア本体 -->
    <model-viewer 
        id="ar-viewer"
        src="neko_s.glb" 
        ios-src="neko_iphone_s.usdz" 
        camera-controls 
        touch-action="pan-y"
        ar
        ar-modes="webxr scene-viewer quick-look"
        alt="A 3D model of a cat">
        
        <!-- WebXR時のDOMオーバーレイに配置する撮影ボタン -->
        <button id="capture-btn" class="btn">📸 写真撮影</button>
        
    </model-viewer>

    <!-- AR起動ボタン用のコンテナ -->
    <div id="ar-ui-container">
        <!-- iOSまたはその他の環境用（標準のARモード起動） -->
        <button id="ar-btn-default" class="btn" style="display:none;">ARで見る</button>
        
        <!-- Android用: 2つのモードを選択可能にする -->
        <button id="ar-btn-webxr" class="btn" style="display:none;">ブラウザで見る (WebXR)</button>
        <button id="ar-btn-scene" class="btn btn-secondary" style="display:none;">アプリで見る (Scene Viewer)</button>
    </div>

    <script>
        const logArea = document.getElementById('log-area');
        
        // ログ出力用関数
        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `[${time}] ${msg}<br>`;
            logArea.scrollTop = logArea.scrollHeight;
            console.log(msg);
        }

        // グローバルなエラーを取得してログに表示
        window.addEventListener('error', (event) => {
            addLog(`Error: ${event.message}`);
        });
        window.addEventListener('unhandledrejection', (event) => {
            addLog(`Promise Error: ${event.reason}`);
        });

        addLog("アプリ初期化完了");

        const modelViewer = document.getElementById('ar-viewer');
        const containerUI = document.getElementById('ar-ui-container');
        const btnDefault = document.getElementById('ar-btn-default');
        const btnWebxr = document.getElementById('ar-btn-webxr');
        const btnScene = document.getElementById('ar-btn-scene');
        const captureBtn = document.getElementById('capture-btn');

        // デバイスの判定
        const ua = navigator.userAgent;
        const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        const isAndroid = /Android/.test(ua);

        addLog(`Device: ${isIOS ? 'iOS' : (isAndroid ? 'Android' : 'Other')}`);

        // プラットフォームに応じたボタンの表示切替
        if (isAndroid) {
            // Androidの場合は2つのボタンを表示 (WebXR / Scene Viewer)
            btnWebxr.style.display = 'block';
            btnScene.style.display = 'block';
        } else {
            // iOSなどの場合は単一の標準ARボタンを表示 (Quick Lookなど)
            btnDefault.style.display = 'block';
        }

        // カスタムAR起動関数
        function activateAR(mode) {
            addLog(`AR起動を試行: ${mode}`);
            
            // 選択されたモードを優先するように ar-modes 属性を書き換える
            if (mode === 'webxr') {
                modelViewer.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
            } else if (mode === 'scene-viewer') {
                modelViewer.setAttribute('ar-modes', 'scene-viewer webxr quick-look');
            } else {
                modelViewer.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
            }
            
            // 書き換え後、少し待ってから activateAR() を実行
            setTimeout(() => {
                modelViewer.activateAR().catch((err) => {
                    addLog('AR起動エラー: ' + err.message);
                });
            }, 50);
        }

        // ボタンのクリックイベント登録
        btnWebxr.addEventListener('click', () => activateAR('webxr'));
        btnScene.addEventListener('click', () => activateAR('scene-viewer'));
        btnDefault.addEventListener('click', () => activateAR('default'));

        // ARステータス変更イベント (セッション開始・終了の検知)
        modelViewer.addEventListener('ar-status', (event) => {
            const status = event.detail.status;
            addLog(`AR status変更: ${status}`);
            
            if (status === 'session-started') {
                // ARセッションが開始されたら起動メニューを隠す
                containerUI.style.display = 'none';

                // WebXRモードかどうかを調べて撮影ボタンを表示する
                // (Scene ViewerやQuick Lookは別アプリ起動となるためDOMオーバーレイは効かない)
                const isWebxrActive = modelViewer.getAttribute('ar-modes').startsWith('webxr');
                // ブラウザによるWebXR処理中であれば撮影ボタンを表示
                if (isWebxrActive || status === 'session-started') {
                    // 確実にWebXRのDOM Overlay上で見せる
                    captureBtn.style.display = 'block';
                }
            } else if (status === 'not-presenting') {
                // ARセッション終了時は元のUI状態へ戻す
                containerUI.style.display = 'flex';
                captureBtn.style.display = 'none';
                addLog('ARモードを終了しました');
            }
        });

        // 3Dモデル読み込みエラー時
        modelViewer.addEventListener('error', (event) => {
            addLog(`Viewer Error: 詳細をコンソールで確認してください`);
            console.error(event.detail);
        });

        // 撮影ボタン処理機能（WebXRモード用）
        captureBtn.addEventListener('click', async () => {
            addLog("写真撮影ボタンが押されました");
            try {
                // model-viewerのメソッドを使用してスクリーンショットのBlobを作成
                const blob = await modelViewer.toBlob({ idealAspect: true });
                const url = URL.createObjectURL(blob);
                
                // ダウンロード用リンクを作成し、プログラムからクリック
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ar-screenshot.png';
                document.body.appendChild(a);
                a.click();
                
                // アト始末
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                addLog("写真の撮影とダウンロードに成功しました");
            } catch (err) {
                addLog("写真撮影に失敗しました: " + err.message);
            }
        });

        // モデルロード完了イベント
        modelViewer.addEventListener('load', () => {
             addLog("3Dモデル読み込み完了");
        });

    </script>
</body>
</html>
